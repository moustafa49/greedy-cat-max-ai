<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Greedy Cat Max AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{color:#22c55e}

.foods{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.foods button{
padding:15px;
font-size:16px;
background:#1e293b;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.foods button:hover{
background:#22c55e;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:8px 12px;
}

#history{
font-size:20px;
margin-top:15px;
}

#prediction{
font-size:22px;
margin-top:20px;
color:#22c55e;
}

#absence{
margin-top:20px;
font-size:20px;
letter-spacing:6px;
}

.controls button{
margin:10px;
padding:10px 15px;
}

</style>

</head>

<body>

<h1>Greedy Cat Max AI</h1>

<div class="foods">

<button onclick="add('corn')">🌽</button>
<button onclick="add('tomato')">🍅</button>
<button onclick="add('carrot')">🥕</button>
<button onclick="add('pepper')">🌶️</button>

<button onclick="add('fish')">🐟</button>
<button onclick="add('shrimp')">🦐</button>
<button onclick="add('cow')">🐄</button>
<button onclick="add('chicken')">🐔</button>

</div>

<div class="controls">
<button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>
</div>

<h3>Last 20 Rounds</h3>
<div id="history"></div>

<h3>Statistics</h3>
<table id="stats"></table>

<h3>Wave</h3>
<div id="wave"></div>

<h3>Top Picks</h3>
<div id="prediction"></div>

<h3>Absence</h3>
<div id="absence"></div>

<script>

const foods=[
"corn","tomato","carrot","pepper",
"fish","shrimp","cow","chicken"
]

const emoji={
corn:"🌽",
tomato:"🍅",
carrot:"🥕",
pepper:"🌶️",
fish:"🐟",
shrimp:"🦐",
cow:"🐄",
chicken:"🐔"
}

let history=JSON.parse(localStorage.getItem("catHistory"))||[]

update()

function add(food){

history.push(food)

if(history.length>600){
history.shift()
}

localStorage.setItem("catHistory",JSON.stringify(history))

update()

}

function undo(){

history.pop()

localStorage.setItem("catHistory",JSON.stringify(history))

update()

}

function reset(){

history=[]

localStorage.removeItem("catHistory")

update()

}

function update(){

let last20=history.slice(-20)

let display=last20.map(x=>emoji[x]).join(" ")

document.getElementById("history").innerText=display

calculate()

}

function calculate(){

let total=history.length

let counts={}
foods.forEach(f=>counts[f]=0)

history.forEach(f=>counts[f]++)

let table="<tr><th>Food</th><th>Count</th><th>%</th></tr>"

let scores=[]
let absenceText=""

foods.forEach(food=>{

let count=counts[food]

let percent= total?((count/total)*100).toFixed(1):0

let last=history.lastIndexOf(food)

let absence= last==-1 ? history.length : history.length-last-1

let ai=parseFloat(percent)+absence*2

let recentHits=history.slice(-5).filter(x=>x==food).length

if(recentHits>=2) ai+=10

table+="<tr><td>"+emoji[food]+" "+food+"</td><td>"+count+"</td><td>"+percent+"%</td></tr>"

scores.push({food:food,score:ai})

let mark=""

if(absence>=10) mark=" 🔵"
if(recentHits>=2) mark=" 🔴"

absenceText+=emoji[food]+" "+absence+mark+"   "

})

document.getElementById("stats").innerHTML=table

scores.sort((a,b)=>b.score-a.score)

let picks=scores.slice(0,5).map(x=>emoji[x.food])

document.getElementById("prediction").innerText=picks.join(" ")

document.getElementById("absence").innerText=absenceText

wave()

}

function wave(){

let veg=["corn","tomato","carrot","pepper"]
let meat=["fish","shrimp","cow","chicken"]

let last10=history.slice(-10)

let vegCount=last10.filter(x=>veg.includes(x)).length
let meatCount=last10.filter(x=>meat.includes(x)).length

document.getElementById("wave").innerText=
"Vegetables "+vegCount+" | Meat "+meatCount

}

</script>

</body>

</html>
