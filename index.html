<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Greedy Cat Max AI ULTRA</title><style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{color:#22c55e}

.foods{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-bottom:12px;
}

.foods button{
padding:12px;
font-size:20px;
background:#1e293b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.foods button:hover{
background:#334155;
}

button{
padding:6px 12px;
margin:6px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
padding:6px 10px;
border:1px solid #334155;
}

.strategy{
width:80%;
margin:auto;
margin-top:10px;
padding:10px;
border-radius:6px;
}

.safe{background:#1e3a8a}
.balanced{background:#92400e}
.aggressive{background:#7f1d1d}

.section{
margin-top:16px;
}

canvas{
background:#111827;
border-radius:10px;
margin-top:10px;
}

</style></head><body><h1>Greedy Cat Max AI ULTRA</h1><div class="foods"><button onclick="add('corn')">🌽</button>
<button onclick="add('tomato')">🍅</button>
<button onclick="add('carrot')">🥕</button>
<button onclick="add('pepper')">🌶</button>

<button onclick="add('fish')">🐟</button>
<button onclick="add('shrimp')">🦐</button>
<button onclick="add('cow')">🐄</button>
<button onclick="add('chicken')">🐔</button>

</div><button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>

<div class="section">
<h3>Last 20 Rounds</h3>
<div id="history"></div>
</div><div class="section">
<h3>Probability Model</h3>
<table id="stats">
<tr><th>Food</th><th>Score</th></tr>
</table>
</div><div class="strategy safe" id="safe"></div>
<div class="strategy balanced" id="balanced"></div>
<div class="strategy aggressive" id="aggressive"></div><div class="section">
<h3>Confidence</h3>
<div id="confidence"></div>
</div><div class="section">
<h3>Suggested Bet</h3>
<div id="bet"></div>
</div><div class="section">
<h3>Wave Detector</h3>
<div id="wave"></div>
</div><div class="section">
<h3>Bias Detector</h3>
<div id="bias"></div>
</div><div class="section">
<h3>Pattern Prediction</h3>
<div id="pattern"></div>
</div><div class="section">
<h3>Next Round</h3>
<div id="next"></div>
</div><div class="section">
<h3>Heat Map</h3>
<div id="heat"></div>
</div><div class="section">
<h3>Absence</h3>
<div id="absence"></div>
</div><div class="section">
<h3>Monte Carlo Simulation</h3>
<div id="monte"></div>
</div><div class="section">
<h3>Hot / Cold Indicator</h3>
<div id="hotcold"></div>
</div><div class="section">
<h3>Radar Probability</h3>
<canvas id="radar" width="300" height="300"></canvas>
</div><div class="section">
<h3>AI Accuracy</h3>
<div id="accuracy"></div>
</div><script>

const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]

const veg=["corn","tomato","carrot","pepper"]
const meat=["fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",
tomato:"🍅",
carrot:"🥕",
pepper:"🌶",
fish:"🐟",
shrimp:"🦐",
cow:"🐄",
chicken:"🐔"
}

let history=JSON.parse(localStorage.getItem("gc_history"))||[]
let correct=JSON.parse(localStorage.getItem("gc_correct"))||0
let predictions=JSON.parse(localStorage.getItem("gc_predictions"))||0

function save(){
localStorage.setItem("gc_history",JSON.stringify(history.slice(-600)))
localStorage.setItem("gc_correct",correct)
localStorage.setItem("gc_predictions",predictions)
}

function add(food){

if(window.lastPrediction){
predictions++
if(window.lastPrediction.includes(food)) correct++
}

history.push(food)

save()
update()
}

function undo(){
history.pop()
save()
update()
}

function reset(){
history=[]
correct=0
predictions=0
save()
update()
}

function count(food){
return history.filter(x=>x==food).length
}

function absence(food){
for(let i=history.length-1;i>=0;i--){
if(history[i]==food) return history.length-i-1
}
return history.length
}

function update(){

let last20=history.slice(-20)

document.getElementById("history").innerHTML=
last20.map(x=>emoji[x]).join(" ")

let stats={}
let table="<tr><th>Food</th><th>Score</th></tr>"

foods.forEach(f=>{

let freq=count(f)
let miss=absence(f)
let trend=history.slice(-10).filter(x=>x==f).length

let score=(freq*1.2)+(miss*0.8)+(trend*3)

stats[f]=score

table+=`<tr><td>${emoji[f]} ${f}</td><td>${score.toFixed(1)}</td></tr>`
})

document.getElementById("stats").innerHTML=table

let sorted=Object.entries(stats).sort((a,b)=>b[1]-a[1])

let vegTop=sorted.filter(x=>veg.includes(x[0])).slice(0,3)
let meatTop=sorted.filter(x=>meat.includes(x[0])).slice(0,2)

let picks=[...vegTop,...meatTop].map(x=>x[0])

window.lastPrediction=picks

document.getElementById("bet").innerHTML=picks.map(x=>emoji[x]).join(" ")

document.getElementById("next").innerHTML=picks.map(x=>emoji[x]).join(" ")

let confidence=Math.min(90,(picks.reduce((a,b)=>a+stats[b],0)/20)*10)

document.getElementById("confidence").innerHTML=confidence.toFixed(1)+"%"

let vegCount=last20.filter(x=>veg.includes(x)).length
let meatCount=last20.filter(x=>meat.includes(x)).length

document.getElementById("wave").innerHTML=
vegCount>meatCount?"Vegetable wave":"Meat wave"

document.getElementById("bias").innerHTML=
emoji[sorted[0][0]]+" hot"

document.getElementById("pattern").innerHTML=
last20.slice(-3).map(x=>emoji[x]).join(" → ")

document.getElementById("heat").innerHTML=
history.slice(-40).map(x=>emoji[x]).join(" ")

document.getElementById("absence").innerHTML=
foods.map(f=>emoji[f]+" "+absence(f)).join(" | ")

document.getElementById("safe").innerHTML=
"SAFE: "+sorted.slice(0,5).map(x=>emoji[x[0]]).join(" ")

document.getElementById("balanced").innerHTML=
"BALANCED: "+sorted.slice(0,4).map(x=>emoji[x[0]]).join(" ")

document.getElementById("aggressive").innerHTML=
"AGGRESSIVE: "+sorted.slice(0,3).map(x=>emoji[x[0]]).join(" ")

let acc = predictions ? ((correct/predictions)*100).toFixed(1) : 0

document.getElementById("accuracy").innerHTML=
acc+"% ("+correct+"/"+predictions+")"

monteCarlo(stats)
hotCold(stats)
radar(stats)

}

function monteCarlo(stats){

let sim={}
foods.forEach(f=>sim[f]=0)

for(let i=0;i<10000;i++){

let total=Object.values(stats).reduce((a,b)=>a+b,0)

let r=Math.random()*total
let acc=0

for(let f in stats){

acc+=stats[f]

if(r<=acc){
sim[f]++
break
}

}

}

let txt=""

foods.forEach(f=>{
let p=(sim[f]/10000*100).toFixed(1)
txt+=emoji[f]+" "+p+"% "
})

document.getElementById("monte").innerHTML=txt

}

function hotCold(stats){

let sorted=Object.entries(stats).sort((a,b)=>b[1]-a[1])

let hot=sorted.slice(0,2).map(x=>emoji[x[0]]).join(" ")
let cold=sorted.slice(-2).map(x=>emoji[x[0]]).join(" ")

document.getElementById("hotcold").innerHTML=
"🔥 Hot: "+hot+" | ❄ Cold: "+cold

}

function radar(stats){

let canvas=document.getElementById("radar")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,300,300)

let cx=150
let cy=150
let r=120

let entries=Object.entries(stats)

entries.forEach((e,i)=>{

let angle=(Math.PI*2/entries.length)*i

let x=cx+r*Math.cos(angle)
let y=cy+r*Math.sin(angle)

ctx.beginPath()
ctx.moveTo(cx,cy)
ctx.lineTo(x,y)
ctx.strokeStyle="#334155"
ctx.stroke()

ctx.fillText(emoji[e[0]],x,y)

})

}

update()

</script></body>
</html>
