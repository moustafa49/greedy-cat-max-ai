<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Greedy Cat Max AI OMEGA</title><style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{color:#22c55e}

.foods{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-bottom:12px;
}

.foods button{
padding:12px;
font-size:20px;
background:#1e293b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.foods button:hover{
background:#334155;
}

.section{
margin-top:16px;
}

.strategy{
width:80%;
margin:auto;
margin-top:8px;
padding:10px;
border-radius:6px;
}

.safe{background:#1e3a8a}
.balanced{background:#92400e}
.aggressive{background:#7f1d1d}

</style></head><body><h1>Greedy Cat Max AI OMEGA</h1><div class="foods"><button onclick="add('corn')">🌽</button>
<button onclick="add('tomato')">🍅</button>
<button onclick="add('carrot')">🥕</button>
<button onclick="add('pepper')">🌶</button>

<button onclick="add('fish')">🐟</button>
<button onclick="add('shrimp')">🦐</button>
<button onclick="add('cow')">🐄</button>
<button onclick="add('chicken')">🐔</button>

</div><button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>

<div class="section">
<h3>Last 20 Rounds</h3>
<div id="history"></div>
</div><div class="section">
<h3>Suggested Bet</h3>
<div id="bet"></div>
</div><div class="strategy safe" id="safe"></div>
<div class="strategy balanced" id="balanced"></div>
<div class="strategy aggressive" id="aggressive"></div><div class="section">
<h3>Confidence</h3>
<div id="confidence"></div>
</div><div class="section">
<h3>Wave Detector</h3>
<div id="wave"></div>
</div><div class="section">
<h3>Bias Detector</h3>
<div id="bias"></div>
</div><div class="section">
<h3>Trap Detector</h3>
<div id="trap"></div>
</div><div class="section">
<h3>Cycle Detector</h3>
<div id="cycle"></div>
</div><div class="section">
<h3>Pattern Prediction</h3>
<div id="pattern"></div>
</div><div class="section">
<h3>Next 3 Rounds</h3>
<div id="future"></div>
</div><div class="section">
<h3>Heat Map</h3>
<div id="heat"></div>
</div><div class="section">
<h3>Absence</h3>
<div id="absence"></div>
</div><div class="section">
<h3>Monte Carlo Simulation</h3>
<div id="monte"></div>
</div><div class="section">
<h3>Hot / Cold Indicator</h3>
<div id="hotcold"></div>
</div><div class="section">
<h3>AI Accuracy</h3>
<div id="accuracy"></div>
</div><script>

const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]

const veg=["corn","tomato","carrot","pepper"]
const meat=["fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",
tomato:"🍅",
carrot:"🥕",
pepper:"🌶",
fish:"🐟",
shrimp:"🦐",
cow:"🐄",
chicken:"🐔"
}

let history=JSON.parse(localStorage.getItem("gc_history"))||[]
let weights=JSON.parse(localStorage.getItem("gc_weights"))||{}
let correct=JSON.parse(localStorage.getItem("gc_correct"))||0
let predictions=JSON.parse(localStorage.getItem("gc_predictions"))||0

foods.forEach(f=>{
if(!weights[f]) weights[f]=1
})

function save(){
localStorage.setItem("gc_history",JSON.stringify(history.slice(-600)))
localStorage.setItem("gc_weights",JSON.stringify(weights))
localStorage.setItem("gc_correct",correct)
localStorage.setItem("gc_predictions",predictions)
}

function add(food){

if(window.lastPrediction){

predictions++

if(window.lastPrediction.includes(food)){
correct++
weights[food]+=0.2
}else{
window.lastPrediction.forEach(p=>weights[p]-=0.05)
}

}

history.push(food)

save()
update()

}

function undo(){
history.pop()
save()
update()
}

function reset(){
history=[]
weights={}
correct=0
predictions=0
save()
update()
}

function count(f){
return history.filter(x=>x==f).length
}

function absence(f){

for(let i=history.length-1;i>=0;i--){

if(history[i]==f) return history.length-i-1

}

return history.length

}

function update(){

let last20=history.slice(-20)

document.getElementById("history").innerHTML=
last20.map(x=>emoji[x]).join(" ")

let stats={}

foods.forEach(f=>{

let freq=count(f)
let miss=absence(f)
let trend=history.slice(-10).filter(x=>x==f).length

let score=(freq*1.2)+(miss*0.9)+(trend*2)+(weights[f]*4)

stats[f]=score

})

let sorted=Object.entries(stats).sort((a,b)=>b[1]-a[1])

let vegTop=sorted.filter(x=>veg.includes(x[0])).slice(0,3)
let meatTop=sorted.filter(x=>meat.includes(x[0])).slice(0,2)

let picks=[...vegTop,...meatTop].map(x=>x[0])

window.lastPrediction=picks

document.getElementById("bet").innerHTML=
picks.map(x=>emoji[x]).join(" ")

document.getElementById("future").innerHTML=
picks.slice(0,3).map(x=>emoji[x]).join(" → ")

document.getElementById("confidence").innerHTML=
(Math.min(90,picks.reduce((a,b)=>a+stats[b],0)/20*10)).toFixed(1)+"%"

let vegCount=last20.filter(x=>veg.includes(x)).length
let meatCount=last20.filter(x=>meat.includes(x)).length

document.getElementById("wave").innerHTML=
vegCount>meatCount?"Vegetable wave":"Meat wave"

document.getElementById("bias").innerHTML=
emoji[sorted[0][0]]+" hot"

let last5=history.slice(-5)

let trap=false

if(last5.length==5){

let f=last5[0]

trap=last5.every(x=>x==f)

}

document.getElementById("trap").innerHTML=
trap?"⚠ Possible trap":"No trap"

let cycle="None"

if(history.length>6){

let a=history.slice(-4,-2).join()

let b=history.slice(-2).join()

if(a==b) cycle="Pattern repeating"

}

document.getElementById("cycle").innerHTML=cycle

document.getElementById("pattern").innerHTML=
last20.slice(-3).map(x=>emoji[x]).join(" → ")

document.getElementById("heat").innerHTML=
history.slice(-40).map(x=>emoji[x]).join(" ")

document.getElementById("absence").innerHTML=
foods.map(f=>emoji[f]+" "+absence(f)).join(" | ")

let sim={}

foods.forEach(f=>sim[f]=0)

for(let i=0;i<10000;i++){

let total=Object.values(stats).reduce((a,b)=>a+b)

let r=Math.random()*total

let acc=0

for(let f in stats){

acc+=stats[f]

if(r<=acc){

sim[f]++

break

}

}

}

let monte=""

foods.forEach(f=>{

let p=(sim[f]/10000*100).toFixed(1)

monte+=emoji[f]+" "+p+"% "

})

document.getElementById("monte").innerHTML=monte

let hot=sorted.slice(0,2).map(x=>emoji[x[0]]).join(" ")

let cold=sorted.slice(-2).map(x=>emoji[x[0]]).join(" ")

document.getElementById("hotcold").innerHTML=
"🔥 Hot: "+hot+" | ❄ Cold: "+cold

document.getElementById("safe").innerHTML=
"SAFE: "+sorted.slice(0,5).map(x=>emoji[x[0]]).join(" ")

document.getElementById("balanced").innerHTML=
"BALANCED: "+sorted.slice(0,4).map(x=>emoji[x[0]]).join(" ")

document.getElementById("aggressive").innerHTML=
"AGGRESSIVE: "+sorted.slice(0,3).map(x=>emoji[x[0]]).join(" ")

let acc=predictions?((correct/predictions)*100).toFixed(1):0

document.getElementById("accuracy").innerHTML=
acc+"% ("+correct+"/"+predictions+")"

}

update()

</script></body>
</html>
