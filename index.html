<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Greedy Cat Max AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.foods{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.foods button{
padding:15px;
font-size:16px;
background:#1e293b;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.foods button:hover{
background:#22c55e;
}

#history{
margin-top:20px;
font-size:18px;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:8px 12px;
}

#prediction{
margin-top:20px;
font-size:22px;
color:#22c55e;
}

</style>

</head>

<body>

<h1>Greedy Cat Max AI</h1>

<div class="foods">

<button onclick="add('corn')">🌽 Corn</button>
<button onclick="add('tomato')">🍅 Tomato</button>
<button onclick="add('carrot')">🥕 Carrot</button>
<button onclick="add('pepper')">🫑 Pepper</button>

<button onclick="add('fish')">🐟 Fish</button>
<button onclick="add('shrimp')">🍤 Shrimp</button>
<button onclick="add('cow')">🐄 Cow</button>
<button onclick="add('chicken')">🐔 Chicken</button>

</div>

<h3>History</h3>
<div id="history"></div>

<h3>Statistics</h3>

<table id="stats">
<tr>
<th>Food</th>
<th>Count</th>
<th>%</th>
</tr>
</table>

<h3>Top Picks</h3>
<div id="prediction"></div>

<script>

const foods=[
"corn","tomato","carrot","pepper",
"fish","shrimp","cow","chicken"
]

let history=[]

function add(food){

history.push(food)

update()

}

function update(){

document.getElementById("history").innerText=
history.join(" → ")

calculate()

}

function calculate(){

let total=history.length

let counts={}

foods.forEach(f=>counts[f]=0)

history.forEach(food=>{
counts[food]++
})

let table=
"<tr><th>Food</th><th>Count</th><th>%</th></tr>"

let scores=[]

foods.forEach(food=>{

let count=counts[food]

let percent= total? ((count/total)*100).toFixed(1):0

table+=
"<tr><td>"+food+"</td><td>"+count+"</td><td>"+percent+"%</td></tr>"

scores.push({
food:food,
score:percent
})

})

document.getElementById("stats").innerHTML=table

scores.sort((a,b)=>b.score-a.score)

let top5=scores.slice(0,5).map(x=>x.food)

document.getElementById("prediction").innerText=
top5.join(" , ")

}

</script>

</body>

</html>
