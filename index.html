<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Greedy Cat Max AI ULTRA</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{color:#22c55e}

.foods{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.foods button{
padding:14px;
font-size:26px;
background:#1e293b;
border:none;
border-radius:10px;
cursor:pointer;
}

.foods button:hover{background:#22c55e}

.section{margin-top:25px}

.strategy{
background:#1e293b;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:18px;
}

.safe{border-left:6px solid #22c55e}
.balanced{border-left:6px solid #eab308}
.aggressive{border-left:6px solid #ef4444}

table{
margin:auto;
margin-top:10px;
border-collapse:collapse;
}

td,th{
border:1px solid #334155;
padding:6px 10px;
}

.bar{
height:8px;
background:#22c55e;
border-radius:5px;
}

#overlay{
position:fixed;
bottom:10px;
right:10px;
background:#111827;
padding:12px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.6);
font-size:16px;
display:none;
}

</style>
</head>

<body>

<h1>Greedy Cat Max AI</h1>

<button onclick="toggleOverlay()">Toggle Overlay</button>

<div class="foods">

<button onclick="add('corn')">🌽</button>
<button onclick="add('tomato')">🍅</button>
<button onclick="add('carrot')">🥕</button>
<button onclick="add('pepper')">🌶</button>

<button onclick="add('fish')">🐟</button>
<button onclick="add('shrimp')">🦐</button>
<button onclick="add('cow')">🐄</button>
<button onclick="add('chicken')">🐔</button>

</div>

<div class="section">
<button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>
</div>

<div class="section">
<h3>Last 20</h3>
<div id="history"></div>
</div>

<div class="section">
<h3>Probability Model</h3>
<table id="prob"></table>
</div>

<div class="section">
<h3>Strategies</h3>
<div id="safe" class="strategy safe"></div>
<div id="balanced" class="strategy balanced"></div>
<div id="aggressive" class="strategy aggressive"></div>
</div>

<div class="section">
<h3>Confidence</h3>
<div id="confidence"></div>
</div>

<div class="section">
<h3>Suggested Bet</h3>
<div id="autobet"></div>
</div>

<div class="section">
<h3>Wave Detector</h3>
<div id="wave"></div>
</div>

<div class="section">
<h3>Bias Detector</h3>
<div id="biasdetect"></div>
</div>

<div class="section">
<h3>Pattern Prediction</h3>
<div id="patternpredict"></div>
</div>

<div class="section">
<h3>Next Round</h3>
<div id="nextforecast"></div>
</div>

<div class="section">
<h3>Session Reset Detector</h3>
<div id="sessionreset"></div>
</div>

<div class="section">
<h3>Heat Map</h3>
<div id="heatmap"></div>
</div>

<div id="overlay">
<div id="overlayPrediction"></div>
</div>

<script>

const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶",
fish:"🐟",shrimp:"🦐",cow:"🐄",chicken:"🐔"
}

const veg=["corn","tomato","carrot","pepper"]
const meat=["fish","shrimp","cow","chicken"]

const baseChance={
corn:18,tomato:18,carrot:18,pepper:18,
shrimp:10,cow:8,fish:6,chicken:4
}

let history=JSON.parse(localStorage.getItem("catHistory"))||[]

update()

function add(food){
history.push(food)
if(history.length>600)history.shift()
localStorage.setItem("catHistory",JSON.stringify(history))
update()
}

function undo(){
history.pop()
localStorage.setItem("catHistory",JSON.stringify(history))
update()
}

function reset(){
history=[]
localStorage.removeItem("catHistory")
update()
}

function update(){

let last20=history.slice(-20)

document.getElementById("history").innerText=
last20.map(x=>emoji[x]).join(" ")

model()

heatmap()

patternPrediction()

waveDetector()

sessionResetDetector()

}

function model(){

let counts={}
foods.forEach(f=>counts[f]=0)

history.forEach(f=>counts[f]++)

let table="<tr><th>Food</th><th>Score</th></tr>"

let scores=[]

foods.forEach(food=>{

let freq=(counts[food]/history.length||0)*100

let last=history.lastIndexOf(food)

let absence= last==-1 ? history.length : history.length-last-1

let trend=history.slice(-10).filter(x=>x==food).length

let score=
baseChance[food]*0.4+
freq*0.5+
absence*0.5+
trend*3

scores.push({food:food,score:score})

let bar=Math.min(score,100)

table+="<tr><td>"+emoji[food]+" "+food+
"</td><td>"+bar.toFixed(1)+
"<div class='bar' style='width:"+bar+"%'></div></td></tr>"

})

document.getElementById("prob").innerHTML=table

strategy(scores)

confidence(scores)

autoBet(scores)

hiddenBias(scores)

nextForecast(scores)

}

function strategy(scores){

scores.sort((a,b)=>b.score-a.score)

let vegScores=scores.filter(x=>veg.includes(x.food))
let meatScores=scores.filter(x=>meat.includes(x.food))

function build(v,m){

let final=[...vegScores.slice(0,v),...meatScores.slice(0,m)]

let total=final.reduce((s,x)=>s+x.score,0)

return final.map(x=>emoji[x.food]+" "+Math.round(x.score/total*100)+"%").join(" ")

}

document.getElementById("safe").innerText="SAFE: "+build(3,3)
document.getElementById("balanced").innerText="BALANCED: "+build(3,2)
document.getElementById("aggressive").innerText="AGGRESSIVE: "+build(2,2)

document.getElementById("overlayPrediction").innerText=build(3,2)

}

function confidence(scores){

scores.sort((a,b)=>b.score-a.score)

let total=scores.reduce((s,x)=>s+x.score,0)
let best=scores[0].score

document.getElementById("confidence").innerText=
((best/total)*100).toFixed(1)+"%"

}

function autoBet(scores){

scores.sort((a,b)=>b.score-a.score)

let picks=scores.slice(0,4)

document.getElementById("autobet").innerText=
picks.map(x=>emoji[x.food]).join(" ")

}

function hiddenBias(scores){

scores.sort((a,b)=>b.score-a.score)

let avg=scores.reduce((s,x)=>s+x.score,0)/scores.length
let top=scores[0]

if(top.score-avg>8)
document.getElementById("biasdetect").innerText=emoji[top.food]+" boosted"
else
document.getElementById("biasdetect").innerText="No bias"

}

function nextForecast(scores){

scores.sort((a,b)=>b.score-a.score)

let top=scores.slice(0,3)

document.getElementById("nextforecast").innerText=
top.map(x=>emoji[x.food]).join(" ")

}

function waveDetector(){

let last30=history.slice(-30)

let vegCount=last30.filter(x=>veg.includes(x)).length
let meatCount=last30.filter(x=>meat.includes(x)).length

if(vegCount>meatCount*1.5)
document.getElementById("wave").innerText="Vegetable wave"

else if(meatCount>vegCount*1.5)
document.getElementById("wave").innerText="Meat wave"

else
document.getElementById("wave").innerText="Balanced"

}

function sessionResetDetector(){

if(history.length<40)return

let recent=history.slice(-20)
let previous=history.slice(-40,-20)

let diff=0

for(let i=0;i<20;i++)
if(recent[i]!=previous[i])diff++

if(diff>12)
document.getElementById("sessionreset").innerText="Session reset likely"

else
document.getElementById("sessionreset").innerText="Session stable"

}

function patternPrediction(){

if(history.length<10)return

let last=history[history.length-1]

let next={}
foods.forEach(f=>next[f]=0)

for(let i=0;i<history.length-1;i++)
if(history[i]==last)
next[history[i+1]]++

let best=null
let count=0

for(let f in next)
if(next[f]>count){count=next[f];best=f}

if(best)
document.getElementById("patternpredict").innerText=
"After "+emoji[last]+" → "+emoji[best]

}

function heatmap(){
document.getElementById("heatmap").innerText=
history.slice(-30).map(x=>emoji[x]).join(" ")
}

function toggleOverlay(){
let o=document.getElementById("overlay")
o.style.display=o.style.display=="none"?"block":"none"
}

</script>

</body>
</html>
