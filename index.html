<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Greedy Cat Max AI v6</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{color:#22c55e}

.foods{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.foods button{
padding:15px;
font-size:22px;
background:#1e293b;
border:none;
border-radius:10px;
cursor:pointer;
}

.foods button:hover{background:#22c55e}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:8px 12px;
}

.bar{
height:10px;
background:#22c55e;
}

#history{font-size:22px;margin-top:10px}

.controls button{
margin:10px;
padding:10px 15px;
}

</style>
</head>

<body>

<h1>Greedy Cat Max AI</h1>

<div class="foods">

<button onclick="add('corn')">🌽</button>
<button onclick="add('tomato')">🍅</button>
<button onclick="add('carrot')">🥕</button>
<button onclick="add('pepper')">🌶️</button>

<button onclick="add('fish')">🐟</button>
<button onclick="add('shrimp')">🦐</button>
<button onclick="add('cow')">🐄</button>
<button onclick="add('chicken')">🐔</button>

</div>

<div class="controls">
<button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>
</div>

<h3>Last 20 Rounds</h3>
<div id="history"></div>

<h3>Probability Model</h3>
<table id="prob"></table>

<h3>Category Bias</h3>
<div id="bias"></div>

<h3>Top Picks</h3>
<div id="prediction"></div>

<h3>Confidence</h3>
<div id="confidence"></div>

<h3>Pattern</h3>
<div id="pattern"></div>

<h3>Heat Map</h3>
<div id="heatmap"></div>

<h3>Absence</h3>
<div id="absence"></div>

<script>

const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",
fish:"🐟",shrimp:"🦐",cow:"🐄",chicken:"🐔"
}

const veg=["corn","tomato","carrot","pepper"]
const meat=["fish","shrimp","cow","chicken"]

const baseChance={
corn:18,tomato:18,carrot:18,pepper:18,
shrimp:10,cow:8,fish:6,chicken:4
}

let history=JSON.parse(localStorage.getItem("catHistory"))||[]

update()

function add(food){

history.push(food)

if(history.length>600)history.shift()

localStorage.setItem("catHistory",JSON.stringify(history))

update()

}

function undo(){

history.pop()

localStorage.setItem("catHistory",JSON.stringify(history))

update()

}

function reset(){

history=[]

localStorage.removeItem("catHistory")

update()

}

function update(){

let last20=history.slice(-20)

document.getElementById("history").innerText=
last20.map(x=>emoji[x]).join(" ")

heatmap()

pattern()

bias()

model()

}

function model(){

let counts={}
foods.forEach(f=>counts[f]=0)

history.forEach(f=>counts[f]++)

let table="<tr><th>Food</th><th>Chance</th></tr>"

let scores=[]
let absenceText=""

foods.forEach(food=>{

let freq=(counts[food]/history.length||0)*100

let last=history.lastIndexOf(food)

let absence= last==-1 ? history.length : history.length-last-1

let trend=history.slice(-10).filter(x=>x==food).length

let score=

baseChance[food]*0.5 +
freq*0.3 +
absence*1.2 +
trend*4

scores.push({food:food,score:score})

let bar=Math.min(score,100)

table+=
"<tr><td>"+emoji[food]+" "+food+
"</td><td>"+bar.toFixed(1)+"<div class='bar' style='width:"+bar+"%'></div></td></tr>"

let mark=""
if(absence>=10)mark=" 🔵"
if(trend>=2)mark=" 🔴"

absenceText+=emoji[food]+" "+absence+mark+"  "

})

document.getElementById("prob").innerHTML=table

document.getElementById("absence").innerText=absenceText

balanced(scores)

}

function balanced(scores){

scores.sort((a,b)=>b.score-a.score)

let vegPick=[]
let meatPick=[]

scores.forEach(x=>{

if(veg.includes(x.food)&&vegPick.length<3)
vegPick.push(x.food)

if(meat.includes(x.food)&&meatPick.length<2)
meatPick.push(x.food)

})

let final=[...vegPick,...meatPick]

document.getElementById("prediction").innerText=
final.map(x=>emoji[x]).join(" ")

let conf=Math.round((vegPick.length+meatPick.length)/5*100)

document.getElementById("confidence").innerText=
conf+"% model confidence"

}

function bias(){

let last20=history.slice(-20)

let v=last20.filter(x=>veg.includes(x)).length
let m=last20.filter(x=>meat.includes(x)).length

let t=v+m

let vp=((v/t)*100||0).toFixed(0)
let mp=((m/t)*100||0).toFixed(0)

document.getElementById("bias").innerText=
"Vegetables "+vp+"% | Meat "+mp+"%"

}

function pattern(){

if(history.length<3)return

document.getElementById("pattern").innerText=
history.slice(-3).map(x=>emoji[x]).join(" ")

}

function heatmap(){

document.getElementById("heatmap").innerText=
history.slice(-30).map(x=>emoji[x]).join(" ")

}

</script>

</body>
</html>
