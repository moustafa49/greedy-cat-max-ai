<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Greedy Cat Max AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{color:#22c55e}

.foods{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.foods button{
padding:15px;
font-size:26px;
background:#1e293b;
border:none;
border-radius:10px;
cursor:pointer;
}

.foods button:hover{background:#22c55e}

.controls button{
margin:10px;
padding:10px 15px;
}

.bar{
height:10px;
background:#22c55e;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:8px 12px;
}

#history{font-size:22px;margin-top:10px}

.section{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<h1>Greedy Cat Max AI</h1>

<div class="foods">

<button onclick="add('corn')">🌽</button>
<button onclick="add('tomato')">🍅</button>
<button onclick="add('carrot')">🥕</button>
<button onclick="add('pepper')">🌶️</button>

<button onclick="add('fish')">🐟</button>
<button onclick="add('shrimp')">🦐</button>
<button onclick="add('cow')">🐄</button>
<button onclick="add('chicken')">🐔</button>

</div>

<div class="controls">
<button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>
</div>

<div class="section">
<h3>Last 20 Rounds</h3>
<div id="history"></div>
</div>

<div class="section">
<h3>Probability Model</h3>
<table id="prob"></table>
</div>

<div class="section">
<h3>Prediction Strategies</h3>
<div id="safe"></div>
<div id="balanced"></div>
<div id="aggressive"></div>
</div>

<div class="section">
<h3>Category Bias</h3>
<div id="bias"></div>
</div>

<div class="section">
<h3>Cycle Detector</h3>
<div id="cycle"></div>
</div>

<div class="section">
<h3>Monte Carlo Simulation</h3>
<div id="simulation"></div>
</div>

<div class="section">
<h3>Pattern</h3>
<div id="pattern"></div>
</div>

<div class="section">
<h3>Heat Map</h3>
<div id="heatmap"></div>
</div>

<div class="section">
<h3>Absence</h3>
<div id="absence"></div>
</div>

<script>

const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",
fish:"🐟",shrimp:"🦐",cow:"🐄",chicken:"🐔"
}

const veg=["corn","tomato","carrot","pepper"]
const meat=["fish","shrimp","cow","chicken"]

const baseChance={
corn:18,tomato:18,carrot:18,pepper:18,
shrimp:10,cow:8,fish:6,chicken:4
}

let history=JSON.parse(localStorage.getItem("catHistory"))||[]

update()

function add(food){

history.push(food)

if(history.length>600) history.shift()

localStorage.setItem("catHistory",JSON.stringify(history))

update()

}

function undo(){

history.pop()

localStorage.setItem("catHistory",JSON.stringify(history))

update()

}

function reset(){

history=[]

localStorage.removeItem("catHistory")

update()

}

function update(){

let last20=history.slice(-20)

document.getElementById("history").innerText=
last20.map(x=>emoji[x]).join(" ")

heatmap()
pattern()
bias()
detectCycle()
model()

}

function model(){

let counts={}
foods.forEach(f=>counts[f]=0)

history.forEach(f=>counts[f]++)

let table="<tr><th>Food</th><th>Score</th></tr>"

let scores=[]
let absenceText=""

foods.forEach(food=>{

let freq=(counts[food]/history.length||0)*100

let last=history.lastIndexOf(food)

let absence= last==-1 ? history.length : history.length-last-1

let trend=history.slice(-10).filter(x=>x==food).length

let score=
baseChance[food]*0.5+
freq*0.4+
absence*1.2+
trend*4

scores.push({food:food,score:score})

let bar=Math.min(score,100)

table+="<tr><td>"+emoji[food]+" "+food+
"</td><td>"+bar.toFixed(1)+
"<div class='bar' style='width:"+bar+"%'></div></td></tr>"

let mark=""
if(absence>=10) mark=" 🔵"
if(trend>=2) mark=" 🔴"

absenceText+=emoji[food]+" "+absence+mark+"  "

})

document.getElementById("prob").innerHTML=table
document.getElementById("absence").innerText=absenceText

strategy(scores)
monteCarlo(scores)

}

function strategy(scores){

scores.sort((a,b)=>b.score-a.score)

let vegScores=scores.filter(x=>veg.includes(x.food))
let meatScores=scores.filter(x=>meat.includes(x.food))

function build(v,m){

let final=[
...vegScores.slice(0,v),
...meatScores.slice(0,m)
]

let total=final.reduce((s,x)=>s+x.score,0)

return final.map(x=>{
let p=Math.round((x.score/total)*100)
return emoji[x.food]+" "+p+"%"
}).join("  ")

}

document.getElementById("safe").innerText="SAFE: "+build(3,3)

let vegStrength=vegScores.slice(0,3).reduce((s,x)=>s+x.score,0)
let meatStrength=meatScores.slice(0,3).reduce((s,x)=>s+x.score,0)

if(vegStrength>=meatStrength)
document.getElementById("balanced").innerText="BALANCED: "+build(3,2)
else
document.getElementById("balanced").innerText="BALANCED: "+build(2,3)

document.getElementById("aggressive").innerText="AGGRESSIVE: "+build(2,2)

}

function monteCarlo(scores){

let simCount={}
foods.forEach(f=>simCount[f]=0)

let spins=10000

for(let i=0;i<spins;i++){

let total=0
scores.forEach(x=> total+=x.score)

let r=Math.random()*total
let acc=0

for(let x of scores){

acc+=x.score

if(r<=acc){
simCount[x.food]++
break
}

}

}

let result=foods.map(f=>{

let p=((simCount[f]/spins)*100).toFixed(1)
return emoji[f]+" "+p+"%"

})

document.getElementById("simulation").innerText=result.join("  ")

}

function detectCycle(){

if(history.length<6) return

let last=history.slice(-3).join("-")

let count=0

for(let i=0;i<history.length-3;i++){

let seq=history.slice(i,i+3).join("-")

if(seq==last) count++

}

let confidence=Math.min(count*20,100)

document.getElementById("cycle").innerText=
history.slice(-3).map(x=>emoji[x]).join(" ")+" repeating | confidence "+confidence+"%"

}

function bias(){

let last20=history.slice(-20)

let v=last20.filter(x=>veg.includes(x)).length
let m=last20.filter(x=>meat.includes(x)).length

let t=v+m

let vp=((v/t)*100||0).toFixed(0)
let mp=((m/t)*100||0).toFixed(0)

document.getElementById("bias").innerText="Vegetables "+vp+"% | Meat "+mp+"%"

}

function pattern(){

if(history.length<3)return

document.getElementById("pattern").innerText=
history.slice(-3).map(x=>emoji[x]).join(" ")

}

function heatmap(){

document.getElementById("heatmap").innerText=
history.slice(-30).map(x=>emoji[x]).join(" ")

}

</script>

</body>
</html>
