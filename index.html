<script>

const foods = [
"corn",
"tomato",
"carrot",
"pepper",
"fish",
"shrimp",
"cow",
"chicken"
]

let history = []

function addResult(){

let value =
document.getElementById("resultInput").value.toLowerCase()

if(!value) return

history.push(value)

document.getElementById("history").innerText =
history.join(" → ")

predict()

}

function predict(){

let score = {}

foods.forEach(food=>{
score[food] = 0
})

history.forEach((food,i)=>{

score[food] += 2

if(i > history.length-5){
score[food] += 4
}

})

foods.forEach(food=>{

let lastIndex = history.lastIndexOf(food)

if(lastIndex == -1){

score[food] += 3

}else{

let gap = history.length - lastIndex

if(gap > 7){
score[food] += 5
}

}

})

if(history.slice(-1)[0] == "chicken"){
score["chicken"] -= 10
}

let sorted =
Object.entries(score)
.sort((a,b)=>b[1]-a[1])

let top5 =
sorted.slice(0,5).map(x=>x[0])

document.getElementById("prediction").innerText =
top5.join(" , ")

}

</script>
